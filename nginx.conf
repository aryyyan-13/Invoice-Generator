# ─────────────────────────────────────────────────────
# Nginx reverse-proxy configuration for Invoice Console
# Place this file in /etc/nginx/sites-available/ on your VPS
# and symlink to /etc/nginx/sites-enabled/
# ─────────────────────────────────────────────────────

server {
    listen 80;
    server_name invoices.gmpintl.com;

    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name invoices.gmpintl.com;

    # SSL certificates (use Let's Encrypt / Certbot)
    ssl_certificate     /etc/letsencrypt/live/invoices.gmpintl.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/invoices.gmpintl.com/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy all traffic to the Docker container on port 3001
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Increase timeout for PDF generation (Puppeteer can take a few seconds)
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Cache static assets (JS, CSS, images, fonts)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        proxy_pass http://127.0.0.1:3001;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
